<style>
    :root {
        --primary-color: #2563eb;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --bg-card: #ffffff;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Grid konteyneri */
    .posts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 2rem;
        padding: 1.5rem 0;
    }

    /* Karta dizayni */
    .post-card {
        background: var(--bg-card);
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #e5e7eb;
        transition: var(--transition);
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    .post-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.1);
        border-color: var(--primary-color);
    }

    /* Rasm qismi */
    .post-image-wrapper {
        position: relative;
        width: 100%;
        height: 200px;
        overflow: hidden;
        background: #f3f4f6;
    }

    .post-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: var(--transition);
    }

    .post-card:hover .post-image {
        transform: scale(1.05);
    }

    /* Kontent qismi */
    .post-card-content {
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .post-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 0.75rem;
        line-height: 1.4;
    }

    .post-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 1rem;
    }

    .post-text {
        font-size: 0.95rem;
        color: #4b5563;
        line-height: 1.6;
        margin-bottom: 1.5rem;
        flex-grow: 1;
    }

    /* Tugma */
    .btn-read-more {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.6rem 1.2rem;
        background-color: var(--primary-color);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.9rem;
        transition: var(--transition);
        width: fit-content;
    }

    .btn-read-more:hover {
        background-color: #1d4ed8;
        gap: 8px; /* O'q belgisi siljishi uchun */
    }

    /* Bo'sh holat */
    .no-posts {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem 2rem;
        background: #f9fafb;
        border-radius: 12px;
        color: var(--text-muted);
    }

    /* Responsive moslashuv */
    @media (max-width: 640px) {
        .posts-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="posts-grid">
