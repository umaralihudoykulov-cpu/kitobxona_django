<!DOCTYPE html>
<html>
<head>
    <title>Buyurtma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>🧾 Buyurtma berish</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" class="form-control mb-3" placeholder="Ismingiz">

        <input type="text" name="phone" class="form-control mb-3" placeholder="Telefon">

        <textarea name="address" class="form-control mb-3" placeholder="Manzil"></textarea>

        <button class="btn btn-success">Buyurtma berish</button>

    </form>

</div>

</body>
</html>
