<!DOCTYPE html>
<html>
<head>
    <title>{{ book.title }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <div class="row">

            <!-- RASM -->
            <div class="col-md-5 text-center">
                {% if book.image %}
                    <img src="{{ book.image.url }}" class="img-fluid rounded shadow" style="max-height:400px;">
                {% else %}
                    <p>Rasm yo‘q</p>
                {% endif %}
            </div>

            <!-- MA'LUMOT -->
            <div class="col-md-7">

                <h2 class="mb-3">{{ book.title }}</h2>

                <p class="text-muted">
                    ✍️ <b>Muallif:</b> {{ book.author }}
                </p>

                <h4 class="text-success">
                    💰 {{ book.price }} so‘m
                </h4>

                <hr>

                <p>
                    📖 <b>Izoh:</b><br>
                    {{ book.description }}
                </p>

                <a href="/" class="btn btn-secondary mt-3">
                    ⬅ Orqaga
                </a>

                <!-- Agar keyin cart qo‘shsak -->
                <button class="btn btn-primary mt-3">
                    🛒 Savatga qo‘shish
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
